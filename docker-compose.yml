services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      CONVERSATION_SERVICE_URL: http://conversation:8001
      ASSESSMENT_SERVICE_URL: http://assessment:8002
      FRAMEWORK_SERVICE_URL: http://framework:8003
    depends_on:
      - conversation
      - assessment
      - framework

  conversation:
    build: ./services/conversation
    ports:
      - "8001:8001"
    environment:
      FRAMEWORK_SERVICE_URL: http://framework:8003
    depends_on:
      - framework

  assessment:
    build: ./services/assessment
    ports:
      - "8002:8002"
    environment:
      FRAMEWORK_SERVICE_URL: http://framework:8003

  framework:
    build: ./services/framework
    ports:
      - "8003:8003"
    volumes:
      - framework-data:/app/data

  ui:
    build: ./ui
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  framework-data:
