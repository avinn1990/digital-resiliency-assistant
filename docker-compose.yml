# Optional local deployment — not required for Render hosting.
# See render.yaml for the primary deployment path.

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      CONVERSATION_SERVICE_URL: http://conversation:8001
      ASSESSMENT_SERVICE_URL: http://assessment:8002
      FRAMEWORK_SERVICE_URL: http://framework:8003
      LLM_CONVERSATION_SERVICE_URL: http://llm-conversation:8004
    depends_on:
      - conversation
      - assessment
      - framework
      - llm-conversation

  conversation:
    build: ./services/conversation
    ports:
      - "8001:8001"
    environment:
      FRAMEWORK_SERVICE_URL: http://framework:8003
    depends_on:
      - framework

  llm-conversation:
    build: ./services/llm-conversation
    ports:
      - "8004:8004"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: gpt-4o-mini
      EVALUATION_SERVICE_DIR: /app/evaluation-content
    volumes:
      - ./evaluation-services/Information Security Strategy and Planning Services:/app/evaluation-content:ro

  assessment:
    build: ./services/assessment
    ports:
      - "8002:8002"
    environment:
      FRAMEWORK_SERVICE_URL: http://framework:8003

  framework:
    build: ./services/framework
    ports:
      - "8003:8003"
    volumes:
      - framework-data:/app/data

  ui:
    build: ./ui
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  framework-data:
