# Render Blueprint — DEV environment (separate from production on main).
# Deploy: Render Dashboard → New → Blueprint → connect this repo, branch: dev.
# Do not sync this blueprint against production services — all resource names use a -dev suffix.
#
# Wiring:
# - Service URLs use fromService + RENDER_EXTERNAL_URL (https://<name>.onrender.com).
# - No custom domains; UI is served at https://dra-ui-dev.onrender.com (default Render subdomain).
# - CORS_ORIGINS must match the dev UI origin (update if Render assigns a suffixed hostname).
# - Add dev onrender.com URLs to Google OAuth authorized origins after first deploy.
# - Secrets marked sync: false must be set once in the dashboard (Render cannot store them in git).

envVarGroups:
  - name: dra-auth-dev
    envVars:
      - key: GOOGLE_CLIENT_ID
        value: 842344870402-fu23ib77n6ph4kv5c9c5lqaqunghejpa.apps.googleusercontent.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 842344870402-fu23ib77n6ph4kv5c9c5lqaqunghejpa.apps.googleusercontent.com
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
  - name: dra-cors-dev
    envVars:
      # Browser origins allowed to call dra-backend-dev (must match dra-ui-dev host).
      - key: CORS_ORIGINS
        value: https://dra-ui-dev.onrender.com
  # Set OPENAI_API_KEY once in the Render dashboard when syncing this group (cannot live in git).
  - name: dra-openai-dev
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

databases:
  - name: dra-postgres-dev
    plan: basic-256mb
    region: oregon

services:
  # --- Framework service (deploy first; others depend on its URL) ---
  - type: web
    name: dra-framework-dev
    runtime: python
    rootDir: services/framework
    plan: standard
    region: oregon
    branch: dev
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
    disk:
      name: dra-framework-data-dev
      mountPath: data
      sizeGB: 1

  - type: web
    name: dra-conversation-dev
    runtime: python
    rootDir: services/conversation
    plan: free
    region: oregon
    branch: dev
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework-dev
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: dra-llm-conversation-dev
    runtime: python
    rootDir: services/llm-conversation
    plan: free
    region: oregon
    branch: dev
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - fromGroup: dra-openai-dev
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: EVALUATION_SERVICES_DIR
        value: /opt/render/project/src/evaluation-services
      - key: REPO_ROOT
        value: /opt/render/project/src

  - type: web
    name: dra-assessment-dev
    runtime: python
    rootDir: services/assessment
    plan: free
    region: oregon
    branch: dev
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework-dev
          envVarKey: RENDER_EXTERNAL_URL

  # --- API gateway (browser + UI call this service) ---
  - type: web
    name: dra-backend-dev
    runtime: python
    plan: standard
    region: oregon
    branch: dev
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - fromGroup: dra-auth-dev
      - fromGroup: dra-cors-dev
      - fromGroup: dra-openai-dev
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: REPO_ROOT
        value: /opt/render/project/src
      - key: EVALUATION_SERVICES_DIR
        value: /opt/render/project/src/evaluation-services
      - key: CONVERSATION_SERVICE_URL
        fromService:
          type: web
          name: dra-conversation-dev
          envVarKey: RENDER_EXTERNAL_URL
      - key: ASSESSMENT_SERVICE_URL
        fromService:
          type: web
          name: dra-assessment-dev
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework-dev
          envVarKey: RENDER_EXTERNAL_URL
      - key: LLM_CONVERSATION_SERVICE_URL
        fromService:
          type: web
          name: dra-llm-conversation-dev
          envVarKey: RENDER_EXTERNAL_URL
      - key: AUTH_REQUIRED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: dra-postgres-dev
          property: connectionString

  # --- Static UI (VITE_API_URL wired to dra-backend-dev at build time) ---
  - type: web
    name: dra-ui-dev
    runtime: static
    rootDir: ui
    branch: dev
    buildCommand: |
      if [ -z "$VITE_API_URL" ]; then
        echo "FATAL: VITE_API_URL is empty — check render.yaml dra-ui-dev envVars (fromService dra-backend-dev)."
        exit 1
      fi
      echo "Building dra-ui-dev with VITE_API_URL=${VITE_API_URL}"
      npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - fromGroup: dra-auth-dev
      - key: VITE_API_URL
        fromService:
          type: web
          name: dra-backend-dev
          envVarKey: RENDER_EXTERNAL_URL
