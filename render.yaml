# Render Blueprint — dev / staging (branch: dev).
# Production blueprint lives on main (no -dev suffixes, custom domains, standard plans).
# Deploy: connect this repo on Render → Blueprint → track branch dev.
# Do not duplicate these settings manually in the Render UI; change this file and sync the blueprint.
#
# Wiring:
# - Service URLs use fromService + RENDER_EXTERNAL_URL (public https://….onrender.com).
# - UI uses default *.onrender.com hostnames (no custom domains on dev).
# - Secrets marked sync: false must be set once in the dashboard (Render cannot store them in git).

envVarGroups:
  - name: dra-auth-dev
    envVars:
      - key: GOOGLE_CLIENT_ID
        value: 842344870402-fu23ib77n6ph4kv5c9c5lqaqunghejpa.apps.googleusercontent.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 842344870402-fu23ib77n6ph4kv5c9c5lqaqunghejpa.apps.googleusercontent.com
      - key: JWT_SECRET
        value: Zp_NRvUl_lBSU96f9GOXM7XpELqhLjWIEwZe7_cxw3K0R37erXcMgN2CN2B_qwbb
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
  - name: dra-cors-dev
    envVars:
      - key: CORS_ORIGINS
        value: https://dra-ui-dev.onrender.com
  - name: dra-openai-dev
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

databases:
  - name: dra-postgres-dev
    plan: basic-256mb
    region: oregon

services:
  # --- Framework service (deploy first; others depend on its URL) ---
  - type: web
    name: dra-framework-dev
    runtime: python
    rootDir: services/framework
    plan: starter
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
    disk:
      name: dra-framework-dev-data
      mountPath: data
      sizeGB: 1

  - type: web
    name: dra-conversation-dev
    runtime: python
    rootDir: services/conversation
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework-dev
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: dra-llm-conversation-dev
    runtime: python
    rootDir: services/llm-conversation
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - fromGroup: dra-openai-dev
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: EVALUATION_SERVICES_DIR
        value: /opt/render/project/src/evaluation-services
      - key: REPO_ROOT
        value: /opt/render/project/src

  - type: web
    name: dra-assessment-dev
    runtime: python
    rootDir: services/assessment
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework-dev
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: dra-backend-dev
    runtime: python
    plan: starter
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - fromGroup: dra-auth-dev
      - fromGroup: dra-cors-dev
      - fromGroup: dra-openai-dev
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: REPO_ROOT
        value: /opt/render/project/src
      - key: EVALUATION_SERVICES_DIR
        value: /opt/render/project/src/evaluation-services
      - key: CONVERSATION_SERVICE_URL
        fromService:
          type: web
          name: dra-conversation-dev
          envVarKey: RENDER_EXTERNAL_URL
      - key: ASSESSMENT_SERVICE_URL
        fromService:
          type: web
          name: dra-assessment-dev
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework-dev
          envVarKey: RENDER_EXTERNAL_URL
      - key: LLM_CONVERSATION_SERVICE_URL
        fromService:
          type: web
          name: dra-llm-conversation-dev
          envVarKey: RENDER_EXTERNAL_URL
      - key: AUTH_REQUIRED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: dra-postgres-dev
          property: connectionString

  - type: web
    name: dra-ui-dev
    runtime: static
    rootDir: ui
    buildCommand: |
      if [ -z "$VITE_API_URL" ]; then
        echo "FATAL: VITE_API_URL is empty — check render.yaml dra-ui-dev envVars (fromService dra-backend-dev)."
        exit 1
      fi
      echo "Building dra-ui-dev with VITE_API_URL=${VITE_API_URL}"
      npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - fromGroup: dra-auth-dev
      - key: VITE_API_URL
        fromService:
          type: web
          name: dra-backend-dev
          envVarKey: RENDER_EXTERNAL_URL
