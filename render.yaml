# Render Blueprint — single source of truth for production configuration.
# Deploy: Render Dashboard → New → Blueprint → connect this repository.
# Do not duplicate these settings manually in the Render UI; change this file and sync the blueprint.
#
# Wiring:
# - Service URLs use fromService + RENDER_EXTERNAL_URL (public https://….onrender.com).
# - UI custom domain and backend CORS are declared below (digitally-resilient.com).
# - Secrets marked sync: false must be set once in the dashboard (Render cannot store them in git).

envVarGroups:
  - name: dra-auth
    envVars:
      - key: GOOGLE_CLIENT_ID
        value: 842344870402-fu23ib77n6ph4kv5c9c5lqaqunghejpa.apps.googleusercontent.com
      - key: VITE_GOOGLE_CLIENT_ID
        value: 842344870402-fu23ib77n6ph4kv5c9c5lqaqunghejpa.apps.googleusercontent.com
      - key: JWT_SECRET
        value: Zp_NRvUl_lBSU96f9GOXM7XpELqhLjWIEwZe7_cxw3K0R37erXcMgN2CN2B_qwbb
      - key: JWT_EXPIRE_MINUTES
        value: "1440"
  - name: dra-cors
    envVars:
      # Browser origins allowed to call dra-backend (must match dra-ui domains + any extra UI hosts).
      - key: CORS_ORIGINS
        value: https://digitally-resilient.com,https://www.digitally-resilient.com
  # Set OPENAI_API_KEY once in the Render dashboard when syncing this group (cannot live in git).
  - name: dra-openai
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

databases:
  - name: dra-postgres
    plan: basic-256mb
    region: oregon

services:
  # --- Framework service (deploy first; others depend on its URL) ---
  # IMPORTANT: dra-framework must stay on plan: standard (persistent disk + production SLA).
  - type: web
    name: dra-framework
    runtime: python
    rootDir: services/framework
    plan: standard
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
    disk:
      name: dra-framework-data
      mountPath: data
      sizeGB: 1

  - type: web
    name: dra-conversation
    runtime: python
    rootDir: services/conversation
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: dra-llm-conversation
    runtime: python
    rootDir: services/llm-conversation
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - fromGroup: dra-openai
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: EVALUATION_SERVICES_DIR
        value: /opt/render/project/src/evaluation-services
      - key: REPO_ROOT
        value: /opt/render/project/src

  - type: web
    name: dra-assessment
    runtime: python
    rootDir: services/assessment
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework
          envVarKey: RENDER_EXTERNAL_URL

  # --- API gateway (browser + UI call this service) ---
  - type: web
    name: dra-backend
    runtime: python
    plan: standard
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - fromGroup: dra-auth
      - fromGroup: dra-cors
      - fromGroup: dra-openai
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: REPO_ROOT
        value: /opt/render/project/src
      - key: EVALUATION_SERVICES_DIR
        value: /opt/render/project/src/evaluation-services
      - key: CONVERSATION_SERVICE_URL
        fromService:
          type: web
          name: dra-conversation
          envVarKey: RENDER_EXTERNAL_URL
      - key: ASSESSMENT_SERVICE_URL
        fromService:
          type: web
          name: dra-assessment
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework
          envVarKey: RENDER_EXTERNAL_URL
      - key: LLM_CONVERSATION_SERVICE_URL
        fromService:
          type: web
          name: dra-llm-conversation
          envVarKey: RENDER_EXTERNAL_URL
      - key: AUTH_REQUIRED
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: dra-postgres
          property: connectionString

  # --- Static UI (VITE_API_URL wired to dra-backend at build time) ---
  - type: web
    name: dra-ui
    runtime: static
    rootDir: ui
    region: oregon
    buildCommand: |
      if [ -z "$VITE_API_URL" ]; then
        echo "FATAL: VITE_API_URL is empty — check render.yaml dra-ui envVars (fromService dra-backend)."
        exit 1
      fi
      echo "Building dra-ui with VITE_API_URL=${VITE_API_URL}"
      npm ci && npm run build
    staticPublishPath: dist
    domains:
      - digitally-resilient.com
      - www.digitally-resilient.com
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin-allow-popups
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - fromGroup: dra-auth
      - key: VITE_API_URL
        fromService:
          type: web
          name: dra-backend
          envVarKey: RENDER_EXTERNAL_URL
