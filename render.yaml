# Render Blueprint — primary deployment path for this project.
# Deploy: connect repo on Render → New → Blueprint → select render.yaml
# Docs: https://render.com/docs/blueprint-spec
#
# Docker Compose remains optional for local containerized runs (see README).

services:
  # --- Framework service (deploy first; others depend on its URL) ---
  # IMPORTANT: dra-framework must stay on plan: standard (persistent disk + production SLA).
  - type: web
    name: dra-framework
    runtime: python
    rootDir: services/framework
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
    disk:
      name: dra-framework-data
      mountPath: data
      sizeGB: 1

  - type: web
    name: dra-conversation
    runtime: python
    rootDir: services/conversation
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: dra-llm-conversation
    runtime: python
    rootDir: services/llm-conversation
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
  - type: web
    name: dra-assessment
    runtime: python
    rootDir: services/assessment
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework
          envVarKey: RENDER_EXTERNAL_URL

  # --- API gateway (UI and external clients call this service) ---
  # No rootDir: full repo required so evaluation-services/ exists at runtime.
  - type: web
    name: dra-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: CONVERSATION_SERVICE_URL
        fromService:
          type: web
          name: dra-conversation
          envVarKey: RENDER_EXTERNAL_URL
      - key: ASSESSMENT_SERVICE_URL
        fromService:
          type: web
          name: dra-assessment
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRAMEWORK_SERVICE_URL
        fromService:
          type: web
          name: dra-framework
          envVarKey: RENDER_EXTERNAL_URL
      - key: LLM_CONVERSATION_SERVICE_URL
        fromService:
          type: web
          name: dra-llm-conversation
          envVarKey: RENDER_EXTERNAL_URL
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini

  # --- Static UI (build-time VITE_API_URL points at the backend) ---
  - type: web
    name: dra-ui
    runtime: static
    rootDir: ui
    buildCommand: |
      if [ -z "$VITE_API_URL" ]; then
        echo "FATAL: VITE_API_URL is empty. Use dra-backend public URL (RENDER_EXTERNAL_URL)."
        exit 1
      fi
      npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: dra-backend
          envVarKey: RENDER_EXTERNAL_URL
